# ==========================================================================
#  Sunucu Yönetim Paneli — Nginx reverse proxy örneği
#  Domain: panel.turkiyemcepte.com
#
#  Bu dosya /etc/nginx/sites-available/server-panel.conf olarak kopyalanır,
#  /etc/nginx/sites-enabled/ altına sembolik link verilir.
#  SSL sertifikaları için önce certbot çalıştırılmalıdır (bkz. README).
# ==========================================================================

# HTTP -> HTTPS yönlendirme
server {
    listen 80;
    listen [::]:80;
    server_name panel.turkiyemcepte.com;

    # Let's Encrypt doğrulaması bu yol üzerinden yapılır
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS ana sunucu
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name panel.turkiyemcepte.com;

    # --- SSL (certbot bu satırları kendisi de yönetebilir) ---
    ssl_certificate     /etc/letsencrypt/live/panel.turkiyemcepte.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.turkiyemcepte.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- Güvenlik başlıkları ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Yüklenecek dosyalar için üst sınır (dosya yöneticisi upload'ı)
    client_max_body_size 1024m;

    # --- (Opsiyonel ama önerilir) IP whitelist ---
    # Paneli sadece belirli IP'lere açmak için aşağıyı düzenleyip yorumu kaldırın:
    # allow 203.0.113.10;      # ofis IP'niz
    # allow 198.51.100.0/24;   # VPN aralığınız
    # deny all;

    # --- WebSocket (terminal + canlı metrikler) ---
    # Socket.io tüm bağlantıları /ws path'i üzerinden yürütür
    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;   # uzun terminal oturumları kopmasın
        proxy_send_timeout 86400s;
    }

    # --- API + statik frontend (backend her ikisini de sunar) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
